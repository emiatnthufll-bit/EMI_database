services:
  db:
    image: mysql:8.0
    container_name: emi_mysql
    command:
      - mysqld
      - --default-authentication-plugin=mysql_native_password
      - --ngram-token-size=2
      - --innodb-ft-min-token-size=2
      - --ft-min-word-len=2
    env_file:
      - .env
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build: ./backend
    container_name: emi_api
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
    volumes:
      - uploads_data:/app/uploads

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    container_name: emi_web

  caddy:
    image: caddy:2.7.4-alpine
    container_name: emi_caddy
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  uploads_data:
  caddy_data:
  caddy_config:

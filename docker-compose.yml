services:
  db:
    image: mysql:8.0
    container_name: emi_mysql
    command:
      - mysqld
      - --default-authentication-plugin=mysql_native_password
      - --ngram-token-size=2
      - --innodb-ft-min-token-size=2
      - --ft-min-word-len=2
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: emi_db
      MYSQL_USER: emi
      MYSQL_PASSWORD: emipass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-prootpass" ]
      interval: 5s
      timeout: 3s
      retries: 30

  api:
    build: ./backend
    container_name: emi_api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: emi
      DB_PASSWORD: emipass
      DB_NAME: emi_db
      ADMIN_UPLOAD_TOKEN: change-me
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/data:/app/data
      - ./uploads:/app/uploads

  web:
    build: ./frontend
    container_name: emi_web
    environment:
      - VITE_API_URL=/api
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.js:/app/vite.config.js
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js

volumes:
  db_data:
